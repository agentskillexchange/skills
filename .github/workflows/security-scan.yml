name: Security Scan

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/security_scan.py'
      - 'scripts/test_security_patterns.py'
      - 'verification/patterns.json'
      - 'verification/fixtures/security/**'
      - '.github/workflows/security-scan.yml'
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/security_scan.py'
      - 'scripts/test_security_patterns.py'
      - 'verification/patterns.json'
      - 'verification/fixtures/security/**'
      - '.github/workflows/security-scan.yml'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test executable security pattern fixtures
        run: python3 scripts/test_security_patterns.py

      - name: Scan full SKILL.md catalog with executable pattern contract
        run: python3 scripts/security_scan.py skills --github-annotations --quiet
