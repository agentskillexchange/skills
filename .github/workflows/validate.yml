name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/validate-skill.sh'
      - 'scripts/validate_skills.py'
      - 'scripts/security_scan.py'
      - 'scripts/test_security_patterns.py'
      - 'scripts/smoke-agent-endpoints.py'
      - 'verification/patterns.json'
      - 'verification/fixtures/security/**'
      - 'spec/SKILL_SPEC.md'
      - '.github/workflows/validate.yml'
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/validate-skill.sh'
      - 'scripts/validate_skills.py'
      - 'scripts/security_scan.py'
      - 'scripts/test_security_patterns.py'
      - 'scripts/smoke-agent-endpoints.py'
      - 'verification/patterns.json'
      - 'verification/fixtures/security/**'
      - 'spec/SKILL_SPEC.md'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validator dependencies
        run: python3 -m pip install PyYAML

      - name: Validate full SKILL.md catalog
        run: python3 scripts/validate_skills.py --all --github-annotations --quiet

      - name: Test executable security patterns
        run: python3 scripts/test_security_patterns.py

      - name: Scan full SKILL.md catalog for security patterns
        run: python3 scripts/security_scan.py skills --github-annotations --quiet

      - name: Smoke test public agent endpoints
        if: github.event_name == 'push'
        run: python3 scripts/smoke-agent-endpoints.py --base https://agentskillexchange.com
