name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/validate-skill.sh'
      - 'scripts/validate_skills.py'
      - 'scripts/ase_body_quality_gate.py'
      - 'scripts/test_body_quality_fixtures.py'
      - 'scripts/security_scan.py'
      - 'scripts/test_security_patterns.py'
      - 'scripts/smoke-agent-endpoints.py'
      - 'verification/patterns.json'
      - 'verification/fixtures/security/**'
      - 'spec/SKILL_SPEC.md'
      - '.github/workflows/validate.yml'
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/validate-skill.sh'
      - 'scripts/validate_skills.py'
      - 'scripts/ase_body_quality_gate.py'
      - 'scripts/test_body_quality_fixtures.py'
      - 'scripts/security_scan.py'
      - 'scripts/test_security_patterns.py'
      - 'scripts/smoke-agent-endpoints.py'
      - 'verification/patterns.json'
      - 'verification/fixtures/security/**'
      - 'spec/SKILL_SPEC.md'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validator dependencies
        run: python3 -m pip install PyYAML

      - name: Validate full SKILL.md catalog
        run: python3 scripts/validate_skills.py --all --github-annotations --quiet

      - name: Validate changed GitHub repo source claims
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          mapfile -t files < <(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'skills/*/SKILL.md')
          if [ "${#files[@]}" -gt 0 ]; then
            python3 scripts/validate_github_repo_sources.py "${files[@]}"
          else
            echo "No changed skill files to validate."
          fi

      - name: Test generated Installation body quality
        run: python3 scripts/test_body_quality_fixtures.py

      - name: Test executable security patterns
        run: python3 scripts/test_security_patterns.py

      - name: Scan full SKILL.md catalog for security patterns
        run: python3 scripts/security_scan.py skills --github-annotations --quiet

      - name: Smoke test public agent endpoints
        run: python3 scripts/smoke-agent-endpoints.py --base https://agentskillexchange.com
